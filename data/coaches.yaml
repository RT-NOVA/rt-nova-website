standards:
  - title: Development-first coaching
    text: "Practices are built around fundamentals, reps, baseball IQ, communication, and game-speed preparation."
  - title: Positive team culture
    text: "Coaches are expected to model effort, accountability, sportsmanship, and a team-first mindset."
  - title: Clear communication
    text: "Families and players should understand expectations, schedules, roles, and development priorities."
  - title: Program alignment
    text: "Teams operate under shared Rawlings Tigers NOVA standards while still giving each coach room to lead their roster."

