why:
  - title: Reach Local Baseball Families
    text: Amplify your brand with families across the NOVA baseball community, local events, and tournament circuits.
  - title: Support Player Development
    text: Help players access training resources, competitive opportunities, equipment, and a strong team-first environment.
  - title: Be Recognized
    text: Sponsors can receive recognition through banners, social media, team events, and custom collaboration opportunities.
impact:
  - Training facilities, equipment, and field rentals
  - Tournament fees and travel costs
  - Player scholarships and family assistance opportunities
  - Community programs and team operations
packages:
  - name: Single
    amount: "$250"
    features:
      - Sponsor plaque / framed team picture
      - Social media recognition, 1 post
  - name: Double
    amount: "$500"
    features:
      - All Single benefits
      - Team banner logo placement
      - Additional social post
  - name: Triple
    amount: "$750"
    features:
      - All Double benefits
      - Monthly social mentions in-season
  - name: Home Run
    amount: "$1,000"
    featured: true
    features:
      - All Triple benefits
      - Player spotlight with your logo
  - name: Grand Slam
    amount: "$2,000+"
    features:
      - All Home Run benefits
      - Premium placement on banners and media
      - Custom collaboration opportunities
