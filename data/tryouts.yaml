evaluation_areas:
- title: Throwing
  text: Arm action, accuracy, carry, throwing mechanics, and ability to make routine baseball throws.
- title: Fielding
  text: Footwork, glove work, body control, first-step reads, and position-specific fundamentals.
- title: Hitting
  text: Swing mechanics, contact quality, approach, adjustability, and competitive at-bats.
- title: Speed
  text: Athletic movement, baserunning instincts, effort, acceleration, and game-speed actions.
- title: Game IQ
  text: Situational awareness, communication, decision-making, coachability, and team-first habits.
- title: Attitude
  text: Players who are eager to improve, compete with energy, support their teammates, and are prepared to play at a high level.
