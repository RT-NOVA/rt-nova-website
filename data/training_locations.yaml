faq:
  eyebrow: Parent FAQ
  title: Common location questions
  items:
  - question: Where do teams practice outdoors?
    answer: Outdoor training is centered around Veterans Memorial Park Field 4 and
      Eagle Field at Neabsco in Woodbridge, Virginia. Exact assignments still depend
      on permits, team schedules, weather, and field availability.
  - question: Where is winter training held?
    answer: Winter training is keyed around D-BAT Manassas in Manassas, Virginia,
      Metro Baseball Facility in Springfield, Virginia, and the Veterans Community
      Center in Woodbridge, Virginia. Coaches share the exact schedule for each team.
  - question: Are practices always at the same field?
    answer: Not always. These are the primary locations, but exact days, times, and
      field assignments can vary by age group, season, field permits, weather, and
      team needs.
  - question: Do all teams use both indoor facilities?
    answer: Winter training schedules can vary by team. Coaches will share which sessions
      are at D-BAT Manassas, Metro Baseball Facility, or another approved training
      location if needed.
  - question: Are tournament locations separate from training locations?
    answer: Yes. Tournament and game locations vary by event and are separate from
      regular practice and winter training locations.
