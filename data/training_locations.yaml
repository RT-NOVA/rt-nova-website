intro: Rawlings Tigers NOVA teams train at specific Woodbridge outdoor fields during
  the outdoor season and move indoors during the winter. Outdoor work centers on Veterans
  Memorial Park Field 4 and Eagle Field at Neabsco, with winter training at D-BAT
  Manassas and Metro Baseball Facility.
