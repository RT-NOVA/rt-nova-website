expectation:
  eyebrow: Parent Planning
  title: Know where teams train before the season starts.
  text: Rawlings Tigers NOVA uses established outdoor fields and indoor training facilities
    to support team practices, winter workouts, and player development. Exact days,
    times, and assignments are shared by each team coach.
  items:
  - label: Outdoor home fields
    text: Veterans Memorial Park Field 4 and Eagle Field at Neabsco are the key outdoor
      locations for team practices and baseball work.
  - label: Winter indoor work
    text: D-BAT Manassas and Metro Baseball Facility are the winter training locations
      for indoor hitting, throwing, cage work, and development sessions.
  - label: Team communication
    text: Exact days, times, and field assignments are still communicated by each
      head coach once seasonal schedules are finalized.
