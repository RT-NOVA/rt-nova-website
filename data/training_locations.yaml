faq:
  eyebrow: Parent FAQ
  title: "Common location questions"
  items:
    - question: "Are practices always at the same field?"
      answer: "Not always. Teams usually have regular practice patterns, but field permits, weather, and seasonal availability can change exact locations."
    - question: "Where is winter training held?"
      answer: "Winter training is typically held indoors. Exact facility details are shared by each team once the winter schedule is finalized."
    - question: "How far should families expect to drive?"
      answer: "Most regular activities are planned around the Woodbridge, Dumfries, Montclair, Prince William County, and nearby Northern Virginia area."
    - question: "Are tournament locations separate from practice locations?"
      answer: "Yes. Tournament locations vary by event and are separate from regular practice or winter training locations."
    - question: "When will exact locations be shared?"
      answer: "Coaches share exact days, times, and locations once team rosters and seasonal schedules are finalized."

