why:
  kicker: Why Rawlings Tigers NOVA?
  title: Built for the player, the team, and the family.
  intro: "A cleaner program model for families: understand the teams, meet the coaches, register for tryouts, follow accomplishments, and support the organization from one place."
  cards:
    - title: Player Development
      text: Age-appropriate instruction, baseball IQ, practice standards, and accountability that help players keep improving.
      icon: baseball-bat
    - title: Team-First Culture
      text: Competitive teams built around effort, communication, preparation, and representing NOVA the right way.
      icon: team-idea
    - title: Family Experience
      text: Easier access to schedules, tryouts, coaches, watch links, family resources, sponsors, and Booster Club support.
      icon: baseball-glove
    - title: Program Pride
      text: Accolades, player highlights, and team achievements presented in a way that celebrates the players and the organization.
      icon: american-shield
