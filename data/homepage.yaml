development:
  kicker: Player Development
  title: Built around growth, competition, and protecting the player's love for the game.
  items:
    - title: Development-first coaching
      text: Practice plans, game preparation, fundamentals, and baseball IQ are treated as part of the same player-development path.
    - title: Competitive but age-appropriate
      text: Players are challenged through meaningful tournaments and team expectations without losing sight of long-term growth.
    - title: Team and family alignment
      text: Clear communication, shared standards, and family resources help keep players supported on and off the field.
