name = 'website'
compatibility_date = "2026-06-12"
workers_dev = true
preview_urls = true

[build]
command = "./build.sh"

[assets]
directory = "./public"
html_handling = "auto-trailing-slash"
not_found_handling = "404-page"
run_worker_first = false

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
